version: 2

models:

  - name: dim_brand
    description: "Stores unique brands."

    columns:
      - name: brand_id
        tests:
          - unique
          - not_null

      - name: brand_name
        tests:
          - unique
          - not_null

  - name: dim_product_type
    description: "Stores unique product types."

    columns:
      - name: product_type_id
        tests:
          - unique
          - not_null

      - name: product_type
        tests:
          - unique
          - not_null

  - name: dim_currency
    description: "Stores currencies."

    columns:
      - name: currency_id
        tests:
          - unique
          - not_null

      - name: currency
        tests:
          - unique
          - not_null

  - name: dim_price_band
    description: "Stores product price bands."

    columns:
      - name: price_band_id
        tests:
          - unique
          - not_null

      - name: price_band

  - name: fact_products
    description: "Fact table for products."

    columns:
      - name: product_id
        tests:
          - not_null

      - name: brand_id
        tests:
          - not_null

      - name: product_type_id
        tests:
          - not_null

      - name: currency_id
        tests:
          - not_null

      - name: price_band_id
        tests:
          - not_null
